global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "gateway"
    static_configs:
      - targets: ["gateway:5000"]
    metrics_path: /metrics

  - job_name: "ingestion"
    static_configs:
      - targets: ["ingestion:5001"]
    metrics_path: /metrics

  - job_name: "analytics"
    static_configs:
      - targets: ["analytics:5002"]
    metrics_path: /metrics

  - job_name: "simulator"
    static_configs:
      - targets: ["simulator:5003"]
    metrics_path: /metrics
