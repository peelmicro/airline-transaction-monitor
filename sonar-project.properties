# ── SonarQube Project Configuration ─────────────────────────────────────
# Used by the Jenkins pipeline to run static analysis.
# Quality gate is enforced: coverage, code smells, duplication, security hotspots.

sonar.projectKey=airline-transaction-monitor
sonar.projectName=Airline Transaction Monitor
sonar.projectVersion=1.0.0

# ── Source and test directories ─────────────────────────────────────────
sonar.sources=apps/common,apps/gateway,apps/ingestion,apps/analytics,apps/simulator,apps/web/src/app
sonar.tests=tests,apps/web/src/app
sonar.test.inclusions=**/*.spec.ts,**/*.Tests/**,**/*Tests.cs
sonar.exclusions=**/bin/**,**/obj/**,**/node_modules/**,**/dist/**,**/.angular/**,**/Migrations/**,**/wwwroot/**

# ── .NET specific ───────────────────────────────────────────────────────
sonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml
sonar.cs.vstest.reportsPaths=**/TestResults/*.trx

# ── Angular / TypeScript specific ───────────────────────────────────────
sonar.typescript.lcov.reportPaths=apps/web/coverage/lcov.info
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info

# ── Encoding ────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Quality gate thresholds (enforced by sonar-scanner) ─────────────────
# - Minimum coverage on new code: 80%
# - Maximum duplicated lines on new code: 3%
# - Maximum code smells on new code: 0 critical
# - Security hotspots reviewed on new code: 100%
# These are configured in the SonarQube project settings (not the .properties file)
# but documented here for visibility.
